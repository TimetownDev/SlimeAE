#自动更新
auto-update: true
#自动保存间隔(s)
auto-save-period: 300

#调试模式
debug: false

#接入蓬松科技
support-fluffy-machines: true

# 自动合成相关设置
auto-crafting:
  # 每个网络最大同时进行的自动合成任务数
  max-tasks: 32
  # 每个自动合成任务最大物品数量
  max-amount: 100000
  # 每个自动合成任务每tick最大设备处理数
  max-devices-per-tick: 16384
  # 合成卡冷却时间(tick)
  crafting-card-cooldown: 200
  # 并行合成设置
  parallel:
    enabled: true
    max-parallelism: 16

# 链式总线相关设置
chained-bus:
  async: true

# 网络交换机设置
networks-expansion-switch:
  allow-networks-to-ae: true
  allow-ae-to-networks: false

# ME清除器设置
me-cleaner:
  default: 131072

# ME合成触发器设置
me-crafting-trigger:
  default: 64

# ME标准发信器
level-emitter:
  default: 64

# ME材质转换机设置
reskin-machine:
  # 是否启用材质转换功能
  enable: true
  # 是否允许使用玩家头颅纹理
  allow-skull-textures: true
  # 额外禁用的材质列表(除内置黑名单外)
  material-blacklist: []
  # 允许被转换的SlimeAE物品ID列表(留空则允许所有IMEObject物品)
  allowed-targets: []

# 存储元件Lore前缀
# 支持&颜色代码和&#RRGGBB十六进制颜色, 例如: &b, &e, &#EEDC82
storage-cell-lore-prefix: "&#EEDC82"

# 创造存储元件
enable_creative_cell: true

#自动合成-addon
#无尽
enable_InfinityExpansion: true
#星系
enable_Galactifun: true
#黑曜石科技
enable_ObsidianExpansion: true
#抑郁花园
enable_ExoticGarden: true
#网络拓展
enable_NetworksExpansion: true
#网络量子工作台
enable_NTW_QUANTUM_WORKBENCH: true
#末地科技
enable_TranscEndence: true
#逻辑
enable_LogiTech: true
#乱序矩阵合成台
enable_FinalTECH: true
#乱序不合理合成台
enable_FinalTECH_BedrockCraftTable: true

# 世界生成设置
world-gen:
  # 是否启用矿石生成
  enable-ore-gen: true 

storage:
  # 数据库类型: sqlite / mysql
  backend: sqlite
  # 是否使用独立数据库连接池（推荐开启）
  # 设为 false 则回退到共享 Slimefun 连接池
  independent-pool: false

  sqlite:
    file: "plugins/SlimeAEPlugin/data/ae_storage.db"
    wal-mode: true
    busy-timeout: 5000
    read-pool-size: 3
    strict-journal-ordering: false

  mysql:
    host: "localhost"
    port: 3306
    database: "slimeae"
    username: "root"
    password: ""
    pool-size: 5

  journal-retention-minutes: 30
  archive:
    enabled: true
    retention-days: 7
    max-rows: 2000000

  journal-flush-batch-size: 2000
  checkpoint-interval: 60
  checkpoint-threshold: 5000
  auto-save-period: 10
  flush-on-cell-unload: false
  startup-verify-level: 1
  # 备份
  backup:
    enabled: true
    interval-hours: 24
    max-backups: 7

  migration-mode: auto